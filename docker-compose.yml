services:
  sap-proxy:
    build: .
    ports:
      - "${PORT:-8011}:8011"
    environment:
      - SAP_USER=${SAP_USER:?SAP_USER is required}
      - SAP_PASS=${SAP_PASS:?SAP_PASS is required}
      - SAP_BASE_URL=${SAP_BASE_URL:?SAP_BASE_URL is required}
      - SAP_DEPLOYMENT_ID=${SAP_DEPLOYMENT_ID:-}
      - SAP_RESOURCE_GROUP_ID=${SAP_RESOURCE_GROUP_ID:-}
      - SAP_RESOURCE_GROUPS=${SAP_RESOURCE_GROUPS:-doc-grounding,default}
      - SAP_WORKSPACE=${SAP_WORKSPACE:-aicore}
      - API_KEY=${API_KEY:-}
      - ALLOWED_MODELS=${ALLOWED_MODELS:-}
      - SAP_COMPLETION_TIMEOUT=${SAP_COMPLETION_TIMEOUT:-300}
      - MAX_HISTORY_TURNS=${MAX_HISTORY_TURNS:-20}
      - MAX_HISTORY_TOKENS=${MAX_HISTORY_TOKENS:-100000}
      - SAP_MODEL_MAX_TOKENS=${SAP_MODEL_MAX_TOKENS:-16384}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8011/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
